[pytest]
# Pytest configuration for auth_microservice test suite

# Minimum Python version
minversion = 7.0

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    -ra

# Markers for categorizing tests
markers =
    auth: Tests for authentication endpoints
    users: Tests for user profile endpoints
    jwt: Tests for JWT token functionality
    hashing: Tests for password hashing
    integration: Integration tests combining multiple components
    unit: Unit tests for isolated functions
    slow: Tests that take a long time to run

# Coverage options (if pytest-cov is installed)
# addopts = --cov=src --cov-report=html --cov-report=term-missing

# Test paths
testpaths = tests
