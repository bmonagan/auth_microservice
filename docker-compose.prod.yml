services:
  app:
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://auth_user:auth_password@postgres:5432/auth_db}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      APP_BASE_URL: ${APP_BASE_URL:-http://127.0.0.1:8000}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes: []

  postgres:
    image: postgres:16-alpine
    container_name: auth_microservice_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-auth_db}
      POSTGRES_USER: ${POSTGRES_USER:-auth_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-auth_password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-auth_user} -d ${POSTGRES_DB:-auth_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    ports: []

volumes:
  postgres_data:
